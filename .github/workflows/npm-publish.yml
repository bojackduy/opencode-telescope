name: Publish npm package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Verify release version
        id: package
        run: |
          name=$(jq -r .name package.json)
          version=$(jq -r .version package.json)
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$tag_version" != "$version" ]; then
            echo "::error::Git tag $GITHUB_REF_NAME != package.json version $version"
            exit 1
          fi
          if npm view "$name@$version" version &>/dev/null; then
            echo "::error::$name@$version already published"
            exit 1
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Typecheck & test
        run: bun run prepack

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "Published ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"
